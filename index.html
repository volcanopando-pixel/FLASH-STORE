<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLASH STORE | Premium Assets</title>

<style>
:root {
    --bg: #050505;
    --blue: #00d2ff;
    --card: #111116;
    --text: #ffffff;
}

body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* HOME */
.main-hub {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.main-hub h1 {
    font-size: 5rem;
    margin: 0;
    background: linear-gradient(to bottom, #fff, var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-transform: uppercase;
}

.nav-container {
    display: flex;
    gap: 20px;
    margin-top: 40px;
}

.nav-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: white;
    padding: 15px 40px;
    font-weight: bold;
    cursor: pointer;
    text-transform: uppercase;
}

.nav-btn:hover {
    background: white;
    color: black;
}

/* OVERLAYS */
.overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--bg);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    padding: 50px 20px;
    overflow-y: auto;
}

.product-box {
    background: var(--card);
    border: 1px solid #222;
    padding: 20px;
    width: 300px;
    text-align: center;
    margin: 20px;
}

.product-box img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.buy-btn {
    background: var(--blue);
    border: none;
    color: black;
    padding: 10px;
    width: 100%;
    font-weight: bold;
    cursor: pointer;
}

.close {
    position: fixed;
    top: 20px;
    right: 20px;
    cursor: pointer;
    color: var(--blue);
    font-weight: bold;
}

/* ✅ ONLY ADDITION: STOCK COLORS */
.stock {
    font-weight: bold;
}

.stock.green {
    color: #00ff88;
}

.stock.red {
    color: red;
}

/* HIDDEN ADMIN */
#adminPanel {
    display: none;
    position: fixed;
    bottom: 10px;
    right: 10px;
    background: #111;
    padding: 10px;
    border: 1px solid #333;
    z-index: 999;
}
</style>
</head>

<body>

<!-- HOME -->
<div class="main-hub">
    <h1>FLASH STORE</h1>
    <p style="letter-spacing:5px; color:#666;">PREMIUM ASSETS</p>

    <div class="nav-container">
        <button class="nav-btn" onclick="openPage('products')">SAB PRODUCTS</button>
        <button class="nav-btn" onclick="openPage('speciality')">OUR SPECIALITY</button>
    </div>
</div>

<!-- PRODUCTS -->
<div id="products" class="overlay">
    <span class="close" onclick="closePage('products')">[ BACK ]</span>

    <h2>CATALOGUE</h2>

    <div style="display:flex; flex-wrap:wrap; justify-content:center;">

        <div class="product-box">
            <img src="https://tr.rbxcdn.com/180DAY-9515ea71465dcb6054c371352bb1a5be/420/420/BackAccessory/Webp/noFilter">
            <h3>GARAMA & MADUNDUNG</h3>
            <p>Price: 4$</p>
            <p id="stock1"></p>
            <button class="buy-btn" onclick="openPage('steps')">PURCHASE</button>
        </div>

        <div class="product-box">
            <img src="https://tr.rbxcdn.com/180DAY-8301a7d541df61e2ca6c0a331e2e1bbc/420/420/BackAccessory/Webp/noFilter">
            <h3>DRAGON CANNELONI</h3>
            <p>Price: 50$</p>
            <p id="stock2"></p>
            <button class="buy-btn" onclick="openPage('steps')">PURCHASE</button>
        </div>

    </div>
</div>

<!-- SPECIALITY (UNCHANGED) -->
<div id="speciality" class="overlay">
    <span class="close" onclick="closePage('speciality')">[ BACK ]</span>

    <h2>OUR SPECIALITY</h2>

    <p>⚡ Fast delivery</p>
    <p>🛡️ Secure assets</p>
    <p>💎 Premium quality</p>
</div>

<!-- STEPS (UNCHANGED) -->
<div id="steps" class="overlay">
    <span class="close" onclick="closePage('steps')">[ CLOSE ]</span>

    <h2>HOW TO BUY</h2>

    <p>1. Join Discord</p>
    <p>2. Open ticket</p>
    <p>3. Pay and receive item</p>

    <button class="buy-btn"
    onclick="window.open('https://discord.gg/jnpsmsV4xq', '_blank')">
        JOIN DISCORD SERVER
    </button>
</div>

<!-- ADMIN (hidden stock control) -->
<div id="adminPanel">
    <input id="s1" type="number" placeholder="Stock 1">
    <input id="s2" type="number" placeholder="Stock 2">
    <button onclick="saveStock()">SAVE</button>
</div>

<script>
function openPage(id){ document.getElementById(id).style.display='flex'; }
function closePage(id){ document.getElementById(id).style.display='none'; }

function loadStock(){
    let s1 = localStorage.getItem("stock1") || 10;
    let s2 = localStorage.getItem("stock2") || 5;

    updateStock("stock1", s1);
    updateStock("stock2", s2);
}

function updateStock(id, value){
    let el = document.getElementById(id);

    if(value <= 0){
        el.innerText = "OUT OF STOCK";
        el.className = "stock red";
    } else {
        el.innerText = "Stock: " + value;
        el.className = "stock green";
    }
}

function saveStock(){
    localStorage.setItem("stock1", document.getElementById("s1").value);
    localStorage.setItem("stock2", document.getElementById("s2").value);
    loadStock();
}

// ADMIN TOGGLE
document.addEventListener("keydown", function(e){
    if(e.ctrlKey && e.shiftKey && e.key==="M"){
        let panel = document.getElementById("adminPanel");
        panel.style.display = panel.style.display==="block"?"none":"block";
    }
});

loadStock();
</script>

</body>
</html>
